    <aside id="sidebar" class="sidebar-panel">
  <div id="search" class="search-card">

    <div class="instrucciones-busqueda">
      <mat-icon class="icono-info">info</mat-icon>
      <p><strong>Busque monumentos por ubicación o por nombre / clave</strong></p>
      <p>Seleccione Provincia, Cantón y Distrito, o escriba un nombre o clave.</p>
    </div>

    <div class="filtro-bloque">
      <h4 class="bloque-titulo">Búsqueda por ubicación</h4>

      <div class="busqueda-fila">
        <label for="provincia">Provincia</label>
        <select id="provincia" [(ngModel)]="selectedProvincia" (change)="onSelect($event)">
          <option [ngValue]="null">-- Seleccione Provincia --</option>
          <option *ngFor="let provincia of provincias" [ngValue]="provincia">
            {{ provincia.title }}
          </option>
        </select>
      </div>

      <div class="busqueda-fila">
        <label for="canton">Cantón</label>
        <select id="canton" [(ngModel)]="selectedCanton" (change)="onSelectCanton($event)">
          <option [ngValue]="null">-- Seleccione Cantón --</option>
          <option *ngFor="let canton of cantones" [ngValue]="canton">
            {{ canton.title }}
          </option>
        </select>
      </div>

      <div class="busqueda-fila">
        <label for="distrito">Distrito</label>
        <select id="distrito" [(ngModel)]="selectedDistrito">
          <option [ngValue]="null">-- Seleccione Distrito --</option>
          <option *ngFor="let distrito of distritos" [ngValue]="distrito">
            {{ distrito.title }}
          </option>
        </select>
      </div>

      <div class="acciones-busqueda">
        <button class="btn btn-primary btn-buscar" (click)="buscarSitios()">
          <mat-icon>search</mat-icon>
          Buscar
        </button>

        <button class="btn btn-outline-secondary btn-limpiar" (click)="limpiarMapaBusqueda()">
          <mat-icon>refresh</mat-icon>
          Limpiar
        </button>

        <button class="btn btn-outline-warning btn-home" (click)="volverInicioMapa()">
        <mat-icon>home</mat-icon>
        Inicio
        </button>
      </div>
    </div>

    <hr>

    <div class="filtro-bloque">
      <h4 class="bloque-titulo">Búsqueda por nombre o clave</h4>

      <div class="busqueda-fila">
        <label for="nombreClave">Nombre o clave del monumento</label>
        <input
          id="nombreClave"
          type="text"
          placeholder="Ejemplo: Salas o G-365 Sa"
          name="search"
          [(ngModel)]="searchNombre"
        />
      </div>

      <div class="acciones-busqueda">
        <button class="btn btn-primary btn-buscar" (click)="goSearchNombre()">
          <mat-icon>search</mat-icon>
          Buscar por nombre
        </button>
      </div>
    </div>

    <div class="resumen-busqueda">
      <p>Total Monumentos Encontrados : <b class="contador">{{sitios.length}}</b></p>
    </div>

    <hr>

    <h4 class="bloque-titulo">Exportar búsqueda a Excel</h4>
    <div class="container">
      <button mat-raised-button color="primary" (click)="exportAsXLSXFiltered()">
        Exportar a Excel <mat-icon>file_download</mat-icon>
      </button>
    </div>

  </div>
</aside>

  </div>
</div>
